<!doctype html>
<!-- Source for og-image.jpg (the social link preview). Rendered to an image
     by scripts/og-render.mjs — edit here, then: node scripts/og-render.mjs -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      font-family: -apple-system, ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(900px 500px at 50% 115%, rgba(0, 136, 255, 0.10), transparent 70%),
        #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 44px;
      overflow: hidden;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #030712;
    }
    .brand img { width: 38px; height: 38px; }
    h1 {
      font-size: 76px;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: #030712;
      text-align: center;
      line-height: 1.08;
      max-width: 1000px;
    }
    h1 .dot { color: #fd8a02; }
    .convo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 30px;
      border-radius: 9999px;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #ffffff;
      white-space: nowrap;
      box-shadow:
        inset 1px 1px 1px rgba(255, 255, 255, 0.45),
        0 10px 28px rgba(0, 0, 0, 0.22);
    }
    .pill.user { background: rgba(17, 24, 39, 0.92); }
    .pill.peeky {
      background: rgba(0, 100, 216, 0.95);
      box-shadow:
        inset 1px 1px 1px rgba(255, 255, 255, 0.5),
        0 10px 30px rgba(0, 120, 254, 0.4);
    }
    .pill img { width: 32px; height: 32px; }
  </style>
</head>
<body>
  <div class="brand"><img src="../cursor.svg" alt=""> Peeky</div>
  <h1>Control your Mac<br>just by talking<span class="dot">.</span></h1>
  <div class="convo">
    <div class="pill user">"Make a note to remind me to call mom at 9pm"</div>
    <div class="pill peeky"><img src="../cursor.svg" alt=""> Sure, I'll write that down</div>
  </div>
</body>
</html>
